name: Sync Booking.com iCal

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Booking.com calendar
        run: |
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
            -H "x-sync-secret: ${{ secrets.ICAL_SYNC_SECRET }}" \
            "https://bansko-apartment.com/api/sync/booking-ical")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "FAILED with status $HTTP_STATUS"
            exit 1
          fi
